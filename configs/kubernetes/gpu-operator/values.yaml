# GPU Operator Helm values — tuned for AWS EKS
# helm install gpu-operator nvidia/gpu-operator \
#   --namespace gpu-operator --create-namespace \
#   -f values.yaml

operator:
  defaultRuntime: containerd   # EKS uses containerd

# On EKS, nodes come with pre-installed drivers from the AWS Deep Learning AMI.
# Set driver.enabled=false if using DLAMI — GPU Operator should not manage drivers
# that were installed outside of it. Check your node AMI.
driver:
  enabled: true                # Set to false if using AWS DLAMI with pre-installed drivers
  version: "535.104.05"        # Pin driver version for consistency
  repository: nvcr.io/nvidia
  image: driver
  upgradePolicy:
    autoUpgrade: false         # Don't auto-upgrade drivers in production

toolkit:
  enabled: true
  version: v1.14.5-centos7

# Device plugin: exposes nvidia.com/gpu to the K8s scheduler
devicePlugin:
  enabled: true
  config:
    name: device-plugin-config
    create: true
    default: "any"
    data:
      # Time-slicing config — comment out if not needed
      # Uncomment to allow multiple pods per GPU (no memory isolation)
      # any: |-
      #   version: v1
      #   sharing:
      #     timeSlicing:
      #       resources:
      #       - name: nvidia.com/gpu
      #         replicas: 2

# DCGM Exporter: Prometheus metrics for GPU hardware
dcgmExporter:
  enabled: true
  serviceMonitor:
    enabled: true          # Creates ServiceMonitor for Prometheus Operator
    interval: 15s
    honorLabels: false
  # Export these metric groups (trim to what you actually alert on)
  config:
    name: dcgm-metrics-config
    create: true
    data: |
      DCGM_FI_DEV_GPU_UTIL,      gauge, GPU utilization (%)
      DCGM_FI_DEV_MEM_COPY_UTIL, gauge, Memory bandwidth utilization (%)
      DCGM_FI_DEV_FB_FREE,       gauge, Framebuffer memory free (MiB)
      DCGM_FI_DEV_FB_USED,       gauge, Framebuffer memory used (MiB)
      DCGM_FI_DEV_GPU_TEMP,      gauge, GPU temperature (°C)
      DCGM_FI_DEV_POWER_USAGE,   gauge, Power usage (W)
      DCGM_FI_DEV_SM_CLOCK,      gauge, SM clock frequency (MHz)
      DCGM_FI_DEV_MEM_CLOCK,     gauge, Memory clock frequency (MHz)
      DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL, gauge, NVLink bandwidth (MB/s)
      DCGM_FI_DEV_PCIE_TX_THROUGHPUT, gauge, PCIe TX throughput (KB/s)
      DCGM_FI_DEV_PCIE_RX_THROUGHPUT, gauge, PCIe RX throughput (KB/s)
      DCGM_FI_DEV_VGPU_LICENSE_STATUS, gauge, vGPU license status
      DCGM_FI_PROF_GR_ENGINE_ACTIVE, gauge, Graphics engine active (fraction)
      DCGM_FI_PROF_DRAM_ACTIVE,  gauge, DRAM bandwidth active (fraction)

# MIG Manager: manages Multi-Instance GPU partitioning
migManager:
  enabled: false           # Enable only on A100/H100 clusters using MIG
  config:
    name: mig-parted-config
    create: false

# Node Feature Discovery: labels nodes with GPU capabilities
nfd:
  enabled: true            # Required for nvidia.com/gpu.* node labels

# GFD: GPU Feature Discovery
gfd:
  enabled: true

# Tolerations — GPU Operator components need to run on GPU-tainted nodes
tolerations:
- key: nvidia.com/gpu
  operator: Exists
  effect: NoSchedule
- key: "node-role.kubernetes.io/master"
  operator: Exists
  effect: NoSchedule
